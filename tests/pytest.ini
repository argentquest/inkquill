[pytest]
asyncio_mode = auto
testpaths =
    tests/unit
    tests/integration
filterwarnings =
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    ignore:the load_module\(\) method is deprecated and slated for removal in Python 3\.15; use exec_module\(\) instead:DeprecationWarning
    ignore:ast.NameConstant is deprecated and will be removed in Python 3\.14; use ast.Constant instead:DeprecationWarning
    ignore:Accessing argon2.__version__ is deprecated and will be removed in a future release\.:DeprecationWarning
    ignore:coroutine 'AsyncMockMixin\._execute_mock_call' was never awaited:RuntimeWarning
    ignore:coroutine 'Connection\._cancel' was never awaited:RuntimeWarning
markers =
    integration: exercises real HTTP + database flows against a cloned test database
    unit: isolated mock-based tests with no real database or network
