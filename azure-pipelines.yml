# Azure DevOps Pipeline for RAG Story Application
# This pipeline builds and deploys the FastAPI application to Azure App Service

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - 'docs/**'
      - '.gitignore'

pr:
  branches:
    include:
      - main
      - develop

variables:
  # Azure Resource Manager connection created during pipeline creation
  azureServiceConnectionId: '$(AZURE_SERVICE_CONNECTION)'
  
  # Web app name
  webAppName: '$(AZURE_WEBAPP_NAME)'
  
  # Azure Resource Group
  resourceGroupName: '$(AZURE_RESOURCE_GROUP)'
  
  # Python version
  pythonVersion: '3.11'
  
  # Working directory
  workingDirectory: '$(System.DefaultWorkingDirectory)'
  
  # Environment name
  environmentName: '$(Build.SourceBranchName)'

stages:
- stage: Build
  displayName: 'Build stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    - checkout: self
      displayName: 'Checkout code'
      clean: true

    - task: UsePythonVersion@0
      displayName: 'Use Python $(pythonVersion)'
      inputs:
        versionSpec: '$(pythonVersion)'
        addToPath: true

    - script: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install dependencies'
      workingDirectory: $(workingDirectory)

    - script: |
        source venv/bin/activate
        # Run linting
        pip install flake8
        flake8 app --config=.flake8 || true
      displayName: 'Run linting'
      workingDirectory: $(workingDirectory)
      continueOnError: true

    - script: |
        source venv/bin/activate
        # Run tests
        pytest tests/ -v --junitxml=test-results.xml || true
      displayName: 'Run tests'
      workingDirectory: $(workingDirectory)
      continueOnError: true

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/test-results.xml'
        failTaskOnFailedTests: false
      condition: succeededOrFailed()

    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(workingDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true
        excludeFiles: |
          .git/**
          .vscode/**
          .env
          .env.*
          **/__pycache__/**
          **/venv/**
          **/.pytest_cache/**
          logs/**
          *.log

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      displayName: 'Upload package'
      artifact: drop

- stage: DeployDev
  displayName: 'Deploy to Development'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - deployment: DeploymentJob
    displayName: 'Deploy to Dev Environment'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'development'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure App Service'
            inputs:
              azureSubscription: '$(azureServiceConnectionId)'
              appType: 'webAppLinux'
              appName: '$(webAppName)-dev'
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'PYTHON|3.11'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --timeout 120 app.main:app'

          - task: AzureCLI@2
            displayName: 'Run database migrations'
            inputs:
              azureSubscription: '$(azureServiceConnectionId)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Get connection string from Key Vault or App Service settings
                CONNECTION_STRING=$(az webapp config appsettings list --name $(webAppName)-dev --resource-group $(resourceGroupName) --query "[?name=='DATABASE_URL'].value" -o tsv)
                
                # Run migrations (you may need to adjust this based on your setup)
                az webapp ssh --name $(webAppName)-dev --resource-group $(resourceGroupName) --command "cd /home/site/wwwroot && alembic upgrade head"

- stage: DeployProd
  displayName: 'Deploy to Production'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeploymentJob
    displayName: 'Deploy to Production Environment'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure App Service'
            inputs:
              azureSubscription: '$(azureServiceConnectionId)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'PYTHON|3.11'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --timeout 120 app.main:app'

          - task: AzureCLI@2
            displayName: 'Run database migrations'
            inputs:
              azureSubscription: '$(azureServiceConnectionId)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Run migrations
                az webapp ssh --name $(webAppName) --resource-group $(resourceGroupName) --command "cd /home/site/wwwroot && alembic upgrade head"

          - task: AzureCLI@2
            displayName: 'Verify deployment'
            inputs:
              azureSubscription: '$(azureServiceConnectionId)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Check if the app is responding
                APP_URL=$(az webapp show --name $(webAppName) --resource-group $(resourceGroupName) --query defaultHostName -o tsv)
                curl -f https://$APP_URL/docs || exit 1