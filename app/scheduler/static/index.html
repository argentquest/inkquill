<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink & Quill Scheduler Manager</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Ink & Quill Scheduler</h1>
            <div class="header-actions">
                <button id="refreshBtn" class="btn btn-primary" onclick="refreshAll()">
                    <svg class="icon" viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    Refresh
                </button>
                <span id="lastUpdate" class="last-update"></span>
            </div>
        </header>

        <!-- Health Status Card -->
        <section class="card health-card">
            <h2>System Health</h2>
            <div id="healthStatus" class="health-status">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Tasks Overview -->
        <section class="card">
            <h2>Scheduled Tasks</h2>
            <div id="tasksList" class="tasks-list">
                <div class="loading">Loading tasks...</div>
            </div>
        </section>

        <!-- Jobs Management -->
        <section class="card">
            <h2>Active Jobs</h2>
            <div id="jobsList" class="jobs-list">
                <div class="loading">Loading jobs...</div>
            </div>
        </section>

        <!-- Task Detail Modal -->
        <div id="taskModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Task Details</h3>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div id="modalBody" class="modal-body">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
