<!-- Interview Modal Partial Component - Tabler Optimized -->
<!-- Usage: {% include 'partials/interview.html' %} -->

<div class="modal modal-blur fade" id="interviewModal" tabindex="-1" aria-labelledby="interviewModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" id="interviewModalLabel">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-heart-handshake me-2" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.566"/>
                        <path d="M12 6l-3.293 3.293a1 1 0 0 0 0 1.414l.543 .543c.69 .69 1.81 .69 2.5 0l1 -1a3.182 3.182 0 0 1 4.5 0l2.25 2.25"/>
                        <path d="M12.5 15.5l2 2"/>
                        <path d="M15 13l2 2"/>
                    </svg>
                    Welcome! Let's get to know you better
                </h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Loading State -->
                <div id="interview-loading" class="text-center py-5">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h4 class="text-muted">Loading interview questions...</h4>
                    <p class="text-muted">Please wait while we prepare your personalized welcome experience.</p>
                </div>

                <!-- Error State -->
                <div id="interview-error" class="alert alert-important alert-danger d-none" role="alert">
                    <div class="d-flex">
                        <div>
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon alert-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                                <circle cx="12" cy="12" r="9"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                        </div>
                        <div>
                            <h4 class="alert-title">Error Loading Interview</h4>
                            <div class="text-muted" id="interview-error-message">Unable to load interview questions. Please try again.</div>
                            <div class="btn-list mt-2">
                                <button type="button" class="btn btn-outline-danger btn-sm" onclick="location.reload()">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-refresh me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                                        <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/>
                                        <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/>
                                    </svg>
                                    Retry
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Interview Content -->
                <div id="interview-content" class="d-none">
                    <!-- Progress Indicator using Tabler Progress -->
                    <div class="mb-4">
                        <!-- Progress Bar -->
                        <div class="mb-3">
                            <div class="row">
                                <div class="col">
                                    <div class="progress progress-sm">
                                        <div id="progress-bar" class="progress-bar bg-primary" role="progressbar" style="width: 14.3%" aria-valuenow="14.3" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                </div>
                                <div class="col-auto">
                                    <span id="progress-text" class="text-muted small">Question 1 of 7</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Tabler Steps Component -->
                        <div class="steps steps-center steps-lime">
                            <span class="step step-active" data-step="1">1</span>
                            <span class="step" data-step="2">2</span>
                            <span class="step" data-step="3">3</span>
                            <span class="step" data-step="4">4</span>
                            <span class="step" data-step="5">5</span>
                            <span class="step" data-step="6">6</span>
                            <span class="step" data-step="7">7</span>
                        </div>
                    </div>

                    <!-- Question Container -->
                    <div id="question-container" class="card">
                        <div class="card-body">
                            <!-- Questions will be dynamically rendered here -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <div class="btn-list">
                    <button type="button" class="btn me-auto" id="prev-button" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <polyline points="15,6 9,12 15,18"/>
                        </svg>
                        Previous
                    </button>
                    <button type="button" class="btn btn-ghost-warning d-none" id="skip-button">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M13 5l7 7l-7 7M5 5l7 7l-7 7"/>
                        </svg>
                        Skip for now
                    </button>
                    <button type="button" class="btn btn-primary" id="next-button" disabled>
                        Next
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon ms-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <polyline points="9,6 15,12 9,18"/>
                        </svg>
                    </button>
                    <button type="button" class="btn btn-success d-none" id="submit-button">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M5 12l5 5l10 -10"/>
                        </svg>
                        Complete Interview
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Tabler-optimized CSS for Interview Component -->
<style>
/* Tabler Steps Enhancement */
.steps.steps-lime .step {
    border-color: var(--tblr-border-color);
    background-color: var(--tblr-card-bg);
    color: var(--tblr-muted);
}

.steps.steps-lime .step.step-active {
    border-color: var(--tblr-primary);
    background-color: var(--tblr-primary);
    color: var(--tblr-primary-fg);
}

.steps.steps-lime .step.step-completed {
    border-color: var(--tblr-success);
    background-color: var(--tblr-success);
    color: var(--tblr-success-fg);
}

/* Question Card Styles using Tabler spacing */
.question-header {
    margin-bottom: var(--tblr-spacer-4);
}

.question-title {
    font-size: 1.25rem;
    font-weight: var(--tblr-font-weight-medium);
    margin-bottom: var(--tblr-spacer-2);
    color: var(--tblr-body-color);
}

.question-subtitle {
    color: var(--tblr-secondary);
    margin-bottom: var(--tblr-spacer-2);
}

.question-purpose {
    background-color: var(--tblr-bg-surface);
    padding: var(--tblr-spacer-3);
    border-radius: var(--tblr-border-radius);
    border-left: 4px solid var(--tblr-primary);
    margin-bottom: var(--tblr-spacer-3);
}

.question-purpose small {
    color: var(--tblr-secondary);
    font-style: italic;
}

/* Option Cards using Tabler Card System */
.option-grid {
    display: grid;
    gap: var(--tblr-spacer-3);
}

.option-grid.button-cards {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

.option-grid.button-cards-large {
    grid-template-columns: 1fr;
}

.option-card {
    border: 1px solid var(--tblr-border-color);
    background-color: var(--tblr-card-bg);
    padding: var(--tblr-spacer-4);
    border-radius: var(--tblr-border-radius-lg);
    text-align: left;
    transition: all 0.15s ease;
    cursor: pointer;
    position: relative;
    color: var(--tblr-body-color);
}

.option-card:hover {
    border-color: var(--tblr-primary);
    background-color: var(--tblr-bg-surface-secondary);
    box-shadow: var(--tblr-box-shadow-border);
}

.option-card.selected {
    border-color: var(--tblr-primary);
    background-color: var(--tblr-primary);
    color: var(--tblr-primary-fg);
    box-shadow: var(--tblr-box-shadow-border);
}

.option-card.selected .option-description {
    color: rgba(255, 255, 255, 0.9);
}

.option-label {
    font-weight: var(--tblr-font-weight-medium);
    display: block;
    margin-bottom: var(--tblr-spacer-1);
}

.option-description {
    font-size: 0.875rem;
    color: var(--tblr-secondary);
    margin-bottom: 0;
}

.option-icon {
    font-size: 2.5rem;
    margin-bottom: var(--tblr-spacer-2);
    color: var(--tblr-primary);
}

.option-card.selected .option-icon {
    color: var(--tblr-primary-fg);
}

/* Large card style for Question 5 */
.option-card.large-card {
    padding: var(--tblr-spacer-5);
    text-align: center;
}

.option-card.large-card .option-icon {
    font-size: 3rem;
    margin-bottom: var(--tblr-spacer-3);
}

.option-card.large-card .option-label {
    font-size: 1.125rem;
    margin-bottom: var(--tblr-spacer-2);
}

/* Text Input using Tabler Form Controls */
.text-input-container {
    margin-top: var(--tblr-spacer-3);
}

.char-count {
    text-align: right;
    font-size: 0.875rem;
    color: var(--tblr-secondary);
    margin-top: var(--tblr-spacer-1);
}

/* Tabler Tooltip Integration */
.option-tooltip {
    position: absolute;
    top: -10px;
    right: 10px;
    background-color: var(--tblr-dark);
    color: var(--tblr-dark-fg);
    padding: var(--tblr-spacer-2);
    border-radius: var(--tblr-border-radius);
    font-size: 0.75rem;
    max-width: 200px;
    z-index: 1060;
    opacity: 0;
    visibility: hidden;
    transition: all 0.15s ease;
    box-shadow: var(--tblr-box-shadow);
}

.option-card:hover .option-tooltip {
    opacity: 1;
    visibility: visible;
}

/* Animation for question transitions */
.question-content {
    animation: slideInUp 0.2s ease-out;
}

@keyframes slideInUp {
    from { 
        opacity: 0; 
        transform: translateY(1rem); 
    }
    to { 
        opacity: 1; 
        transform: translateY(0); 
    }
}

/* Mobile responsive using Tabler breakpoints */
@media (max-width: 767.98px) {
    .option-grid.button-cards {
        grid-template-columns: 1fr;
    }
    
    .option-card {
        padding: var(--tblr-spacer-3);
    }
    
    .steps {
        font-size: 0.875rem;
    }
}

/* Dark theme compatibility */
[data-theme="dark"] .option-card {
    border-color: var(--tblr-border-color-dark);
    background-color: var(--tblr-dark);
}

[data-theme="dark"] .option-card:hover {
    background-color: var(--tblr-bg-surface-secondary);
}
</style>
