<!-- Progress Bar Component -->
<!-- Usage: {% include "components/progress/progress_bar.html" value=50 max=100 color="primary" %} -->

<div class="progress{% if size %} progress-{{ size }}{% endif %}{% if class %} {{ class }}{% endif %}"
     {% if id %}id="{{ id }}"{% endif %}
     {{ attrs | default('') }}>
    <div class="progress-bar{% if color %} bg-{{ color }}{% endif %}{% if striped %} progress-bar-striped{% endif %}{% if animated %} progress-bar-animated{% endif %}" 
         role="progressbar" 
         style="width: {{ value | default(0) }}%"
         aria-valuenow="{{ value | default(0) }}" 
         aria-valuemin="0" 
         aria-valuemax="{{ max | default(100) }}">
        {% if show_text %}
            {{ value | default(0) }}%
        {% elsif text %}
            {{ text }}
        {% endif %}
    </div>
</div>
