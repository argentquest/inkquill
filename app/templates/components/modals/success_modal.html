<!-- Success Modal Component -->
<!-- Usage: {% include "components/modals/success_modal.html" modal_id="success-modal" title="Success!" message="Operation completed successfully." %} -->

<div class="modal modal-blur fade" id="{{ modal_id | default('success-modal') }}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
        <div class="modal-content">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            <div class="modal-status bg-success"></div>
            <div class="modal-body text-center py-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon mb-2 text-success icon-lg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M9 12l2 2l4 -4"/>
                </svg>
                
                <h3>{{ title | default('Success!') }}</h3>
                <div class="text-secondary">{{ message | default('Operation completed successfully.') }}</div>
            </div>
            
            <div class="modal-footer">
                <div class="w-100">
                    <div class="row">
                        {% if secondary_button %}
                        <div class="col">
                            <button type="button" class="btn w-100" {{ secondary_attrs | default('data-bs-dismiss="modal"') }}>
                                {{ secondary_button }}
                            </button>
                        </div>
                        {% endif %}
                        <div class="col">
                            <button type="button" 
                                    class="btn btn-success w-100" 
                                    {{ primary_attrs | default('data-bs-dismiss="modal"') }}>
                                {{ primary_button | default('OK') }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
