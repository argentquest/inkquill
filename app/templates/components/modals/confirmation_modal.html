<!-- Confirmation Modal Component -->
<!-- Usage: {% include "components/modals/confirmation_modal.html" modal_id="confirm-delete" title="Confirm Action" message="Are you sure?" %} -->

<div class="modal modal-blur fade" id="{{ modal_id | default('confirmation-modal') }}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
        <div class="modal-content">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            <div class="modal-status bg-{{ danger_mode | default(false) | ternary('danger', 'warning') }}"></div>
            <div class="modal-body text-center py-4">
                {% if danger_mode %}
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon mb-2 text-danger icon-lg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <circle cx="12" cy="12" r="9"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                {% else %}
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon mb-2 text-warning icon-lg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M12 9v2m0 4v.01"/>
                        <path d="M5 19h14a2 2 0 0 0 1.84 -2.75l-7.1 -12.25a2 2 0 0 0 -3.5 0l-7.1 12.25a2 2 0 0 0 1.75 2.75"/>
                    </svg>
                {% endif %}
                
                <h3>{{ title | default('Are you sure?') }}</h3>
                <div class="text-secondary">{{ message | default('This action cannot be undone.') }}</div>
            </div>
            
            <div class="modal-footer">
                <div class="w-100">
                    <div class="row">
                        <div class="col">
                            <button type="button" class="btn w-100" data-bs-dismiss="modal">
                                {{ cancel_text | default('Cancel') }}
                            </button>
                        </div>
                        <div class="col">
                            <button type="button" 
                                    class="btn btn-{{ danger_mode | default(false) | ternary('danger', 'primary') }} w-100" 
                                    {{ confirm_attrs | default('') }}>
                                {{ confirm_text | default('Confirm') }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
