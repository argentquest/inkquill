<!-- Input Component -->
<!-- Usage: {% include "components/forms/input.html" name="email" label="Email Address" type="email" required=true %} -->

<div class="mb-3{% if class %} {{ class }}{% endif %}">
    {% if label %}
    <label class="form-label{% if required %} required{% endif %}" 
           {% if for %}for="{{ for }}"{% elif name %}for="{{ name }}"{% endif %}>
        {{ label }}
        {% if description %}
        <span class="form-label-description">{{ description }}</span>
        {% endif %}
    </label>
    {% endif %}
    
    {% if icon %}
    <div class="input-icon">
        <span class="input-icon-addon">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                {% case icon %}
                    {% when 'email' %}
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <circle cx="12" cy="12" r="4"/>
                        <path d="M16 12v1.5a2.5 2.5 0 0 0 5 0v-1.5a9 9 0 1 0 -5.5 8.28"/>
                    {% when 'password' %}
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <rect x="5" y="11" width="14" height="10" rx="2"/>
                        <circle cx="12" cy="16" r="1"/>
                        <path d="M8 11v-4a4 4 0 0 1 8 0v4"/>
                    {% when 'user' %}
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <circle cx="12" cy="7" r="4"/>
                        <path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/>
                    {% when 'search' %}
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <circle cx="10" cy="10" r="7"/>
                        <path d="M21 21l-6 -6"/>
                    {% else %}
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <circle cx="12" cy="12" r="1"/>
                {% endcase %}
            </svg>
        </span>
        <input type="{{ type | default('text') }}" 
               class="form-control{% if input_class %} {{ input_class }}{% endif %}" 
               {% if name %}name="{{ name }}"{% endif %}
               {% if id %}id="{{ id }}"{% elif name %}id="{{ name }}"{% endif %}
               {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
               {% if value %}value="{{ value }}"{% endif %}
               {% if required %}required{% endif %}
               {% if readonly %}readonly{% endif %}
               {% if disabled %}disabled{% endif %}
               {% if maxlength %}maxlength="{{ maxlength }}"{% endif %}
               {% if pattern %}pattern="{{ pattern }}"{% endif %}
               {% if autocomplete %}autocomplete="{{ autocomplete }}"{% endif %}
               {{ attrs | default('') }}>
    </div>
    {% else %}
    <input type="{{ type | default('text') }}" 
           class="form-control{% if input_class %} {{ input_class }}{% endif %}" 
           {% if name %}name="{{ name }}"{% endif %}
           {% if id %}id="{{ id }}"{% elif name %}id="{{ name }}"{% endif %}
           {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
           {% if value %}value="{{ value }}"{% endif %}
           {% if required %}required{% endif %}
           {% if readonly %}readonly{% endif %}
           {% if disabled %}disabled{% endif %}
           {% if maxlength %}maxlength="{{ maxlength }}"{% endif %}
           {% if pattern %}pattern="{{ pattern }}"{% endif %}
           {% if autocomplete %}autocomplete="{{ autocomplete }}"{% endif %}
           {{ attrs | default('') }}>
    {% endif %}
    
    {% if hint %}
    <small class="form-hint">{{ hint }}</small>
    {% endif %}
</div>
