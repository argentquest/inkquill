<!-- Blog Navigation Bar -->
<div class="blog-nav-bar">
    <div class="container-fluid">
        <div class="row align-items-center py-2">
            <div class="col-auto">
                <nav aria-label="breadcrumb" class="mb-0">
                    <ol class="breadcrumb breadcrumb-dots mb-0">
                        <li class="breadcrumb-item">
                            <a href="{{ url_for('blog_home') }}" class="text-decoration-none">
                                <i class="fas fa-home me-1"></i>
                                Blog
                            </a>
                        </li>
                        {% if breadcrumb_active %}
                        <li class="breadcrumb-item active" aria-current="page">
                            {{ breadcrumb_active }}
                        </li>
                        {% endif %}
                    </ol>
                </nav>
            </div>
            <div class="col text-end">
                <div class="btn-list flex-wrap">
                    {% if current_user and current_user.is_authenticated %}
                        <a href="{{ url_for('blog_editor') }}" class="btn btn-primary btn-sm">
                            <i class="fas fa-plus me-1"></i>
                            New Post
                        </a>
                        <a href="{{ url_for('blog_dashboard') }}" class="btn btn-outline-primary btn-sm">
                            <i class="fas fa-tachometer-alt me-1"></i>
                            Dashboard
                        </a>
                    {% else %}
                        <a href="{{ url_for('blog_home') }}" class="btn btn-outline-secondary btn-sm">
                            <i class="fas fa-search me-1"></i>
                            Browse Posts
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
