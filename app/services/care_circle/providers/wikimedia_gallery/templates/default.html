<table class="section section--wikimedia-gallery wikimedia-gallery" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title wikimedia-gallery__heading">📸 {{ theme_label }}</h2>
    {% if theme_tagline %}
    <p class="wikimedia-gallery__tagline section__subtitle">{{ theme_tagline }}</p>
    {% endif %}
    <table class="wikimedia-gallery__frame" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            {% if image_url %}
            <td class="wikimedia-gallery__image-cell" width="60%" valign="top" style="padding-right:16px; vertical-align:top">
                <img src="{{ image_url }}" alt="{{ title }}" class="wikimedia-gallery__image" style="width:100%; max-height:420px; object-fit:cover; border-radius:10px; display:block">
            </td>
            {% endif %}
            <td class="wikimedia-gallery__details-cell" width="{% if image_url %}40%{% else %}100%{% endif %}" valign="top">
                {% if title %}
                <p class="wikimedia-gallery__title section__body section__body--large">{{ title }}</p>
                {% endif %}
                {% if description %}
                <p class="wikimedia-gallery__description section__body mt-md">{{ description }}</p>
                {% endif %}
                {% if credit %}
                <p class="wikimedia-gallery__credit text-muted section__body--italic mt-md" style="font-size:12px;">{{ credit }}</p>
                {% endif %}
            </td>
        </tr>
    </table>
  </td></tr>
</table>
