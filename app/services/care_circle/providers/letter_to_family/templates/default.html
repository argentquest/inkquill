<table class="section section--letter_to_family" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">✉️ Letter to Family</h2>
    <div style="background: #fffbf0; border-left: 3px solid #d4a843; border-radius: 6px; padding: 14px 18px; margin-top: 10px; font-family: Georgia, serif; line-height: 1.8;">
      <p class="section__body"><strong>{{ greeting }}</strong></p>
      <p class="section__body mt-sm" style="line-height: 1.75;">{{ body }}</p>
      <p class="section__body mt-md section__body--italic">{{ signature }}</p>
    </div>
  </td></tr>
</table>
