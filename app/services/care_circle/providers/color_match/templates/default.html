<table class="section section--color-match" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">🎨 {{ title }}</h2>
    <p class="section__subtitle">{{ instruction }}</p>
    <table class="section__body color-match" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" valign="middle">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        {% for option in options %}
                        <td align="center" valign="middle" class="color-match__option" style="min-width:100px; padding:14px 24px; border:2px solid #d86c3d; border-radius:12px; background:rgba(216,108,61,0.06);">
                            {{ option }}
                        </td>
                        {% if not loop.last %}
                        <td style="width:16px">&nbsp;</td>
                        {% endif %}
                        {% endfor %}
                    </tr>
                </table>
            </td>
        </tr>
        <tr><td height="14">&nbsp;</td></tr>
        <tr>
            <td align="center" class="section__body section__body--italic text-muted">(Answer is upside down below)</td>
        </tr>
        <tr><td height="10">&nbsp;</td></tr>
        <tr>
            <td align="center" class="color-match__answer section__body">
                <span style="display:inline-block; transform:rotate(180deg); -webkit-transform:rotate(180deg); -ms-transform:rotate(180deg); writing-mode:vertical-rl; text-orientation:upside-down">{{ answer }}</span>
            </td>
        </tr>
    </table>
  </td></tr>
</table>
