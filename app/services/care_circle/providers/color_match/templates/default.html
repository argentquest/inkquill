<table class="section section--color-match" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">🎨 {{ title }}</h2>
    <p class="section__subtitle">{{ instruction }}</p>
    <table class="section__body color-match" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" valign="middle">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        {% for option in options %}
                        <td align="center" valign="middle" class="color-match__option" style="min-width:100px; padding:16px 28px; border:3px solid #059669; border-radius:12px; background:#fff; font-size:22px; font-weight:700; font-family:Verdana,Arial,sans-serif">
                            {{ option }}
                        </td>
                        {% if not loop.last %}
                        <td style="width:20px">&nbsp;</td>
                        {% endif %}
                        {% endfor %}
                    </tr>
                </table>
            </td>
        </tr>
        <tr><td height="16">&nbsp;</td></tr>
        <tr>
            <td align="center" class="section__body section__body--italic text-muted" style="font-size:18px; font-style:italic; color:#64748b; font-family:Verdana,Arial,sans-serif">(Answer is upside down below)</td>
        </tr>
        <tr><td height="12">&nbsp;</td></tr>
        <tr>
            <td align="center" class="color-match__answer" style="font-size:20px; font-weight:700; font-family:Verdana,Arial,sans-serif">
                <!-- Upside-down text using flip for email compatibility -->
                <span style="display:inline-block; transform:rotate(180deg); -webkit-transform:rotate(180deg); -ms-transform:rotate(180deg); filter:FlipV; writing-mode:vertical-rl; text-orientation:upside-down">{{ answer }}
            </span></td>
        </tr>
    </table>
  </td></tr>
</table>
