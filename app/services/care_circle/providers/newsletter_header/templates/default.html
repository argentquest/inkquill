<table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-radius:14px 14px 0 0; background:#2d6a9f;">
  <tr>
    <td style="padding:28px 36px; background:#1e3a5f; border-radius:14px 14px 0 0;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr valign="middle">

          <!-- Brand -->
          <td width="140" style="padding-right:20px; border-right:1px solid rgba(255,255,255,0.3);">
            <div style="font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.7); font-family:Verdana,sans-serif; margin-bottom:4px;">Care Circle</div>
            <div style="font-size:20px; font-weight:800; color:#ffffff; font-family:Georgia,'Times New Roman',serif; line-height:1.2;">Daily<br>Newsletter</div>
          </td>

          <!-- Patient name -->
          <td style="padding-left:24px;">
            <div style="font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.65); font-family:Verdana,sans-serif; margin-bottom:4px;">Prepared for</div>
            <div style="font-size:28px; font-weight:800; color:#ffffff; font-family:Georgia,'Times New Roman',serif; line-height:1.15;">{{ patient_name }}</div>
            {% if family_name %}
            <div style="font-size:14px; font-weight:600; color:rgba(255,255,255,0.82); font-family:Verdana,sans-serif; margin-top:3px;">{{ family_name }} Family</div>
            {% endif %}
          </td>

          <!-- Date -->
          <td width="170" align="right" style="padding-left:20px;">
            <div style="font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.65); font-family:Verdana,sans-serif; margin-bottom:4px;">Generated on</div>
            <div style="font-size:13px; font-weight:600; color:rgba(255,255,255,0.92); font-family:Verdana,sans-serif; white-space:nowrap;">{{ generated_at }}</div>
          </td>

        </tr>
      </table>
    </td>
  </tr>
  <!-- Accent bar -->
  <tr>
    <td height="5" style="background:#f59e0b; font-size:0; line-height:0; border-radius:0 0 0 0;">&nbsp;</td>
  </tr>
</table>
<div style="height:20px; font-size:0; line-height:0;">&nbsp;</div>
