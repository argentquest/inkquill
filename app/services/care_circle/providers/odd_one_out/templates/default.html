<div class="section section--odd-one-out">
    <h2 class="section__title">🎯 {{ title }}</h2>
    <p class="section__subtitle">{{ instruction }}</p>
    <div class="section__body odd-one-out">
        <div class="odd-one-out__items">
            {% for item in items %}
            <div class="odd-one-out__item">
                {{ item }}
            </div>
            {% endfor %}
        </div>
        <p class="section__body section__body--italic text-muted mt-md">(Answer is upside down below)</p>
        <p class="section__body odd-one-out__answer">{{ answer }}</p>
    </div>
</div>
