<table class="section section--complete-the-duo" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">🤝 {{ title }}</h2>
    <p class="section__subtitle">{{ instruction }}</p>
    <table class="section__body complete-the-duo" width="100%" cellpadding="0" cellspacing="0" border="0">
        {% for pair in pairs %}
        <tr class="complete-the-duo__row">
            <td class="complete-the-duo__prompt" valign="top" style="padding:4px 8px 4px 0">{{ loop.index }}. {{ pair.prompt }}</td>
            <td class="complete-the-duo__blank" valign="top" style="padding:4px 0 4px 8px">&nbsp;</td>
        </tr>
        {% endfor %}
        <tr>
            <td colspan="2">
                <p class="section__body section__body--italic text-muted mt-md">(Answers below — upside down)</p>
            </td>
        </tr>
        <tr>
            <td colspan="2" class="complete-the-duo__answers">
                {% for pair in pairs %}<span>{{ loop.index }}. {{ pair.answer }}</span>{% endfor %}
            </td>
        </tr>
    </table>
  </td></tr>
</table>
