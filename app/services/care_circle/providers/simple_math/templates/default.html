<div class="section section--simple-math">
    <h2 class="section__title">🔢 {{ title }}</h2>
    <p class="section__subtitle">{{ instruction }}</p>
    <div class="section__body simple-math">
        <p class="simple-math__problem">
            {{ problem }}
        </p>
        <p class="section__body section__body--italic text-muted mt-lg">(Answer is upside down below)</p>
        <p class="section__body simple-math__answer">
            = {{ answer }}
        </p>
    </div>
</div>
