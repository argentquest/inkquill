<table class="section section--hymn_of_the_day" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">🎼 Hymn of the Day</h2>
    <h3 class="section__subtitle">{{ title }}</h3>
    <p class="section__body text-muted mt-md"><em>First published: {{ era }}</em></p>
    <p class="section__body section__body--italic mt-md" style="white-space:pre-line; line-height:1.8;">{{ lyrics_excerpt }}</p>
    <p class="section__body text-muted mt-md">{{ note }}</p>
  </td></tr>
</table>
