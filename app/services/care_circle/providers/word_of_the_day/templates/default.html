<table class="section section--word_of_the_day" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">📖 Word of the Day</h2>
    <p class="section__body section__body--large"><strong>{{ word }}</strong> <em style="font-size:0.85em; color:#64748b;">({{ part_of_speech }})</em></p>
    <p class="section__body mt-sm">{{ definition }}</p>
    <p class="section__body section__body--italic text-muted mt-md">"{{ example }}"</p>
  </td></tr>
</table>
