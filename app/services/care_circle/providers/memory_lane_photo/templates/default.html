<table class="section section--memory-lane-photo memory-lane-photo" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title memory-lane-photo__title">📷 Memory Lane</h2>
    <table class="memory-lane-photo__frame" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            {% if image_url %}
            <td class="memory-lane-photo__image-cell" width="60%" valign="top" style="padding-right:16px; vertical-align:top">
                <img src="{{ image_url }}" alt="Vintage memory" class="memory-lane-photo__image" style="width:100%; border-radius:8px; object-fit:cover; display:block">
            </td>
            {% endif %}
            <td class="memory-lane-photo__content-cell" width="{% if image_url %}40%{% else %}100%{% endif %}" valign="top">
                <p class="section__body section__body--large memory-lane-photo__description" style="font-size:30px; font-weight:700; line-height:1.7; margin:0">
                    {{ description }}
                </p>
            </td>
        </tr>
    </table>
  </td></tr>
</table>
