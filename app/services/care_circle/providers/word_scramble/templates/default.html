<div class="section section--word-scramble">
    <h2 class="section__title">🔀 {{ title }}</h2>
    <p class="section__subtitle">{{ instruction }}</p>
    <div class="section__body word-scramble">
        <p class="word-scramble__puzzle">
            {{ puzzle }}
        </p>
        {% if hint %}
        <p class="word-scramble__hint">{{ hint }}</p>
        {% endif %}
        <p class="section__body section__body--italic text-muted mt-md">(Answer is upside down below)</p>
        <p class="section__body word-scramble__answer">{{ answer }}</p>
    </div>
</div>
