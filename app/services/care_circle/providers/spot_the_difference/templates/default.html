<table class="section section--spot-the-difference" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">🔍 {{ title }}</h2>
    <p class="section__subtitle">{{ instruction }}</p>
    <table class="section__body spot-the-difference" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td class="spot-the-difference__list spot-the-difference__list--a" width="50%" valign="top" style="padding:12px; border-radius:8px; border:2px solid #d86c3d; vertical-align:top">
                <p class="spot-the-difference__label section__subtitle" style="margin:0 0 10px; text-align:center;" align="center">List A</p>
                {% for word in list_a %}
                <p class="spot-the-difference__word section__body" style="margin:0; padding:5px 0; border-bottom:1px solid rgba(35,25,19,0.10); text-align:center;" align="center">{{ word }}</p>
                {% endfor %}
            </td>
            <td style="width:14px">&nbsp;</td>
            <td class="spot-the-difference__list spot-the-difference__list--b" width="50%" valign="top" style="padding:12px; border-radius:8px; border:2px solid #1f3b36; vertical-align:top">
                <p class="spot-the-difference__label section__subtitle" style="margin:0 0 10px; text-align:center;" align="center">List B</p>
                {% for word in list_b %}
                <p class="spot-the-difference__word section__body" style="margin:0; padding:5px 0; border-bottom:1px solid rgba(35,25,19,0.10); text-align:center;" align="center">{{ word }}</p>
                {% endfor %}
            </td>
        </tr>
        <tr><td colspan="3" height="14">&nbsp;</td></tr>
        <tr>
            <td colspan="3" align="center" class="section__body section__body--italic text-muted">(Answer below — upside down)</td>
        </tr>
        <tr><td colspan="3" height="10">&nbsp;</td></tr>
        <tr>
            <td colspan="3" align="center" class="section__body spot-the-difference__answer" style="transform:rotate(180deg); -webkit-transform:rotate(180deg); -ms-transform:rotate(180deg)" align="center">
                List A had "{{ changed_in_a }}" — List B had "{{ changed_in_b }}"
            </td>
        </tr>
    </table>
  </td></tr>
</table>
