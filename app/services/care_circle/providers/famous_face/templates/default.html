<div class="section section--famous_face">
  <h2 class="section__title">⭐ Famous Face</h2>
  <p class="section__body section__body--large mt-sm"><strong>{{ name }}</strong></p>
  <p class="section__body text-muted mt-xs"><em>{{ category }} &bull; {{ era }}</em></p>
  <p class="section__body mt-sm">{{ known_for }}</p>
  <p class="section__body mt-md" style="border-top: 1px solid #e2e8f0; padding-top: 10px;"><strong>Did you know?</strong> {{ fun_fact }}</p>
</div>
