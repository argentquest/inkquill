<table class="section section--animal-friend" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">🐾 {{ title | default("Animal Friend") }}</h2>
    <table class="animal-friend" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            {% if image_url %}
            <td class="animal-friend__image-cell" width="60%" valign="top" style="padding-right:16px">
                <img src="{{ image_url }}" alt="{{ animal }}" class="animal-friend__image" style="width:100%; border-radius:16px; object-fit:cover; display:block">
            </td>
            {% else %}
            <td class="animal-friend__fallback-cell" width="60%" valign="middle" align="center" style="padding-right:16px; font-size:120px; line-height:1">🐕</td>
            {% endif %}
            <td class="animal-friend__fact-cell" width="40%" valign="middle">
                <p class="section__body section__body--large animal-friend__fact" style="font-size:30px; font-weight:700; line-height:1.7; margin:0; font-style:italic">
                    {{ fact }}
                </p>
            </td>
        </tr>
    </table>
  </td></tr>
</table>
