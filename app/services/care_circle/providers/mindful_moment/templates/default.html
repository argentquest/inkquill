<table class="section section--mindful_moment" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr><td>
    <h2 class="section__title">🌸 Mindful Moment</h2>
    <h3 class="section__subtitle">{{ title }}</h3>
    <p class="section__body mt-md" style="line-height: 1.7;">{{ instruction }}</p>
    {% if duration_note %}
    <p class="section__body text-muted mt-md section__body--italic">{{ duration_note }}</p>
    {% endif %}
  </td></tr>
</table>
