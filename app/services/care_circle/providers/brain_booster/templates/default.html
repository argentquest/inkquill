<div class="section section--brain_booster">
    <h2 class="section__title">🧠 Brain Booster</h2>
    <p class="section__body section__body--large">{{ prompt }}</p>
    {% if answer %}
    <p class="section__body section__body--italic text-muted mt-md">(Answer is upside down below)</p>
    <p class="section__body answer-upside-down">{{ answer }}</p>
    {% endif %}
</div>
