{% macro prov(kind, label='') -%}
<span class="prov-pill prov-pill--{{ kind }}">
  {%- if kind == 'auto' -%}
    <svg width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true"><circle cx="4" cy="4" r="3.5" fill="currentColor" opacity="0.6"/></svg>
    {{ label or 'AI Generated' }}
  {%- elif kind == 'curated' -%}
    <svg width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true"><path d="M4 1l.9 1.8 2 .3-1.45 1.4.34 2L4 5.5l-1.79.94.34-2L1.1 3.1l2-.3z" fill="currentColor"/></svg>
    {{ label or 'Curated' }}
  {%- elif kind == 'family' -%}
    <svg width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true"><path d="M4 1C2.9 1 2 1.9 2 3s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 5c-2 0-3 .9-3 1.5h6C7 6.9 6 6 4 6z" fill="currentColor"/></svg>
    {{ label or 'From Your Family' }}
  {%- else -%}
    {{ label }}
  {%- endif -%}
</span>
{%- endmacro %}
