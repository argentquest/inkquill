services:
  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ${CARE_CIRCLE_RUNTIME_ENV_FILE}
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      POSTGRES_SERVER: db
      POSTGRES_PORT: "5432"
      APP_LOG_DIR: /app/logs
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/robots.txt >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    volumes:
      - ${CARE_CIRCLE_DATA_ROOT}/cache:/app/cache
      - ${CARE_CIRCLE_DATA_ROOT}/logs/backend:/app/logs
    restart: unless-stopped

  scheduler:
    build:
      context: ../..
      dockerfile: Dockerfile.scheduler
    env_file:
      - ${CARE_CIRCLE_RUNTIME_ENV_FILE}
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: "5432"
      SCHEDULER_PORT: "8001"
      APP_LOG_DIR: /app/logs
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/scheduler/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - ${CARE_CIRCLE_DATA_ROOT}/cache:/app/cache
      - ${CARE_CIRCLE_DATA_ROOT}/logs/scheduler:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontendv1
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "${CARE_CIRCLE_PUBLIC_PORT}:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - ${CARE_CIRCLE_RUNTIME_ENV_FILE}
    volumes:
      - ${CARE_CIRCLE_DATA_ROOT}/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  default:
    name: ${CARE_CIRCLE_PROJECT_NAME}_network
