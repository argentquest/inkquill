# Use Docker's internal DNS resolver so upstreams are resolved at request time,
# not at nginx startup (avoids "host not found" crashes during container boot).
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    # Upstream addresses as variables — resolved lazily via Docker DNS
    set $backend_addr  http://backend:8000;
    set $frontend_addr http://frontend:3000;

    client_max_body_size 50m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Uncomment once HTTPS is active on the host:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location ^~ /api/ {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location ^~ /ws/ {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /ui/ {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location ^~ /static/ {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location ^~ /uploads/ {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location ^~ /published/ {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location = /robots.txt {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /docs {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location = /redoc {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location = /openapi.json {
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass $frontend_addr;
        proxy_http_version 1.1;
    }
}
