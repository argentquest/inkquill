<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 18px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .swatch { width: 64px; height: 64px; border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding: 6px 8px; color: var(--paper); font-family: var(--font-mono); font-size: 10px; line-height: 1.1; }
  .swatch.lt { color: var(--ink-900); }
  .swatch .name { font-family: var(--font-sans); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }
  
  .nav { background: rgba(246,241,232,0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-subtle); border-radius: 18px; padding: 16px 22px; display:flex; flex-direction:column; gap: 12px; box-shadow: var(--shadow-soft); }
  .nav .top { display:flex; justify-content:space-between; align-items:center; }
  .wm { font-family: var(--font-display); font-weight: 500; font-size: 22px; letter-spacing: 0.08em; color: var(--ink-900); }
  .actions { display:flex; gap: 10px; align-items:center; }
  .chip2 { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border-subtle); background: var(--paper-2); font-size: 12px; color: var(--fg-2); }
  .links { display: flex; gap: 6px; flex-wrap:wrap; }
  .links a { padding: 6px 14px; border-radius: 999px; font-size: 13px; color: var(--fg-2); transition: 180ms ease; }
  .links a.active { background: rgba(0,0,0,0.04); color: var(--ink-900); }

</style></head><body><div class="card">
  <div class="label">Top nav · sticky, blurred paper</div>
  <nav class="nav">
    <div class="top">
      <div class="wm">Ink &amp; Quill</div>
      <div class="actions">
        <span class="chip2">✦ 1,240</span>
        <span class="chip2">🌙</span>
        <span class="chip2">Rose ▾</span>
      </div>
    </div>
    <div class="links">
      <a class="active">Family Home</a><a>Account</a><a>Providers</a><a>Billing</a><a>Referrals</a><a>Friend Login</a><a>Help</a>
    </div>
  </nav>
</div></body></html>
