services:
  backend:
    environment:
      APP_ENV: production
      APP_URL: http://localhost:8083
      POSTGRES_SERVER: host.docker.internal
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_PROD_DB:-inkquill_codebase_prod}
      BACKEND_CORS_ORIGINS: '["http://localhost:8083"]'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "48000:8000"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api/v1

  gateway:
    ports:
      - "8083:80"
