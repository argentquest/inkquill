services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-single-vm
    restart: unless-stopped
    environment:
      POSTGRES_DB: inkquill
      POSTGRES_USER: inkquill
      POSTGRES_PASSWORD: inkandquill_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_single_vm:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_single_vm: