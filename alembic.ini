# /story_app/alembic.ini
# A generic, single database configuration.

[alembic]
# Path to the migration script directory, relative to the main configuration file.
# This directory contains the individual version scripts.
script_location = alembic

# Path to the directory containing Mako templates for generating new migration scripts.
# Defaults to alembic:templates
# template_path = %(here)s/templates

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Set to 'true' to allow Alembic to truncate identifiers longer than the max supported length.
# Set to 'false' to raise an error on long identifiers.
# truncate_identifiers = false

# Timezone to use when rendering timestamps in migration file templates.
# Leave blank for UTC, or set to a timezone name (e.g., "America/Chicago")
# timezone =

# Suffix for SQL script files generated when using --sql mode.
# Defaults to ".sql"
# output_encoding = utf-8

# sqlalchemy.url: URL for connecting to the database.
# IMPORTANT: This URL is used when running Alembic commands.
# It's often best to set this dynamically via an environment variable or
# have env.py read it from your application's config (as we did).
# The value set here might be overridden by env.py.
# Example: sqlalchemy.url = postgresql+asyncpg://user:password@host:port/dbname
# We leave it commented out or minimal here because env.py sets it from app config.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration section. Refers to sections below.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Additional options specific to env.py tasks (optional)
# Example: setting timezone for file naming
# revision_environment = true
# timezone = UTC

# Options for 'autogenerate' comparisons (optional)
# compare_type = true
# compare_server_default = true
