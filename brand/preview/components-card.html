<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 12px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }

  .pcard {
    background: rgba(255,255,255,0.78);
    border: 1px solid var(--border-subtle);
    border-radius: 20px;
    box-shadow: var(--shadow-panel);
    padding: 14px 16px;
  }
  .eyebrow2 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.22em; color: var(--fg-3); }
  .title { font-family: var(--font-display); font-size: 20px; line-height: 1.15; margin-top: 4px; color: var(--fg-1); }
  .body { margin-top: 6px; font-size: 13px; line-height: 1.55; color: var(--fg-2); }
  .chips { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .chip {
    padding: 2px 10px;
    border-radius: 999px;
    border: 1px solid var(--border-subtle);
    background: var(--paper-2);
    font-size: 12px; color: var(--fg-2);
  }

</style></head><body><div class="card">
  <div class="label">Card · condensed translucent on paper</div>
  <article class="pcard">
    <p class="eyebrow2">Ellis family</p>
    <h2 class="title">Rose Ellis</h2>
    <p class="body">Stage 2 care profile with delivery at 08:30 in Europe/London.</p>
    <div class="chips"><span class="chip">Gardening</span><span class="chip">Crosswords</span><span class="chip">Opera</span></div>
  </article>
</div></body></html>
