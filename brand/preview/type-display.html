<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 18px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .swatch { width: 64px; height: 64px; border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding: 6px 8px; color: var(--paper); font-family: var(--font-mono); font-size: 10px; line-height: 1.1; }
  .swatch.lt { color: var(--ink-900); }
  .swatch .name { font-family: var(--font-sans); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }
  
  .d1 { font-family: var(--font-display); font-size: 48px; line-height: 1.05; font-weight: 500; letter-spacing: 0.005em; }
  .d2 { font-family: var(--font-display); font-size: 34px; line-height: 1.1; font-weight: 500; }
  .d3 { font-family: var(--font-display); font-size: 24px; line-height: 1.2; font-weight: 500; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }

</style></head><body><div class="card">
  <div class="label">Display · EB Garamond</div>
  <div class="d1">A writer's desk.</div>
  <div class="d2">Choose the 3 pictures that belong to you.</div>
  <div class="d3">Focused workspace.</div>
  <div class="meta">font-display · weight 500 · line-height 1.05–1.2</div>
</div></body></html>
