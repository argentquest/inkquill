<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 18px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .swatch { width: 64px; height: 64px; border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding: 6px 8px; color: var(--paper); font-family: var(--font-mono); font-size: 10px; line-height: 1.1; }
  .swatch.lt { color: var(--ink-900); }
  .swatch .name { font-family: var(--font-sans); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }
  
  .grid3 { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat { background: rgba(255,255,255,0.78); border:1px solid var(--border-subtle); border-radius: 26px; padding: 18px; box-shadow: var(--shadow-panel); }
  .stat p { font-size: 11px; font-weight:600; text-transform: uppercase; letter-spacing: 0.24em; color: var(--fg-3); margin:0; }
  .stat h2 { font-family: var(--font-display); font-size: 40px; line-height: 1.1; color: var(--fg-1); margin-top: 10px; }
  .stat small { display:block; margin-top: 10px; font-size: 13px; color: var(--fg-2); }

</style></head><body><div class="card">
  <div class="label">Stat cards · big serif numbers + eyebrow</div>
  <div class="grid3">
    <div class="stat"><p>Coins</p><h2>1,240</h2><small>+80 this week</small></div>
    <div class="stat"><p>Friends</p><h2>3</h2><small>Active profiles</small></div>
    <div class="stat"><p>Sessions</p><h2>47</h2><small>Delivered this month</small></div>
  </div>
</div></body></html>
