<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 18px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .swatch { width: 64px; height: 64px; border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding: 6px 8px; color: var(--paper); font-family: var(--font-mono); font-size: 10px; line-height: 1.1; }
  .swatch.lt { color: var(--ink-900); }
  .swatch .name { font-family: var(--font-sans); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }
  
  .sp-row { display: flex; align-items: center; gap: 12px; margin: 4px 0; }
  .bar { height: 10px; background: var(--ink-300); border-radius: 999px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 60px; }

</style></head><body><div class="card">
  <div class="label">Spacing · 4px base</div>
  <div class="sp-row"><div class="tok">4px</div><div class="bar" style="width:12px"></div></div><div class="sp-row"><div class="tok">8px</div><div class="bar" style="width:24px"></div></div><div class="sp-row"><div class="tok">12px</div><div class="bar" style="width:36px"></div></div><div class="sp-row"><div class="tok">16px</div><div class="bar" style="width:48px"></div></div><div class="sp-row"><div class="tok">20px</div><div class="bar" style="width:60px"></div></div><div class="sp-row"><div class="tok">24px</div><div class="bar" style="width:72px"></div></div><div class="sp-row"><div class="tok">32px</div><div class="bar" style="width:96px"></div></div><div class="sp-row"><div class="tok">48px</div><div class="bar" style="width:144px"></div></div>
</div></body></html>
