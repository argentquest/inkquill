<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 18px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .swatch { width: 64px; height: 64px; border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding: 6px 8px; color: var(--paper); font-family: var(--font-mono); font-size: 10px; line-height: 1.1; }
  .swatch.lt { color: var(--ink-900); }
  .swatch .name { font-family: var(--font-sans); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }
  
  .eb-sm { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.24em; color: var(--fg-3); }
  .eb-md { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.28em; color: var(--fg-3); }
  .eb-lg { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.32em; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }

</style></head><body><div class="card">
  <div class="label">Eyebrows · wide-tracked ALL CAPS micro-labels</div>
  <div class="eb-sm">Care Circle · tracking 0.24em</div>
  <div class="eb-md">Storytelling account · tracking 0.28em</div>
  <div class="eb-lg">Friend sign-in · tracking 0.32em</div>
  <div class="meta">12px · 600 · uppercase · letter-spacing 0.24–0.32em · color ink-600</div>
</div></body></html>
