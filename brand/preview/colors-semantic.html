<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 18px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .swatch { width: 64px; height: 64px; border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding: 6px 8px; color: var(--paper); font-family: var(--font-mono); font-size: 10px; line-height: 1.1; }
  .swatch.lt { color: var(--ink-900); }
  .swatch .name { font-family: var(--font-sans); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }
  
  .pill { display:flex; align-items:center; gap:8px; padding: 12px 16px; border-radius: 22px; border:1px solid; font-size: 13px; }

</style></head><body><div class="card">
  <div class="label">Semantic · status tones</div>
  <div class="row" style="flex-direction:column; align-items:stretch; gap:10px;">
    <div class="pill" style="color:var(--info-fg); background:var(--info-bg); border-color:var(--info-border);"><strong>Info</strong> — calm, cool mist</div>
    <div class="pill" style="color:var(--success-fg); background:var(--success-bg); border-color:var(--success-border);"><strong>Success</strong> — forest / mist</div>
    <div class="pill" style="color:var(--warning-fg); background:var(--warning-bg); border-color:var(--warning-border);"><strong>Warning</strong> — ember-washed</div>
    <div class="pill" style="color:var(--danger-fg); background:var(--danger-bg); border-color:var(--danger-border);"><strong>Danger</strong> — muted brick</div>
  </div>
</div></body></html>
