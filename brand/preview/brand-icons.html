<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 14px; font-family: var(--font-sans); color: var(--fg-1); }
  .card { display: flex; flex-direction: column; gap: 14px; }
  .label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.24em; }
  .sublabel { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 6px; }

  .ig { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .ibox {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 6px 10px;
    border-radius: 14px;
    border: 1px solid var(--border-subtle);
    background: var(--paper-2);
  }
  .ibox .chip {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: grid; place-items: center;
  }
  .ibox .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }

  /* Semantic color roles — pulled from the brand palette */
  .role-people   { background: rgba( 75, 107, 79, 0.14); color: #3f5e43; } /* forest */
  .role-care     { background: rgba(207,111,145, 0.16); color: #a54b70; } /* rose */
  .role-billing  { background: rgba(224,159, 62, 0.18); color: #a46616; } /* sun/ochre */
  .role-gift     { background: rgba(216,108, 61, 0.18); color: #b2532a; } /* ember */
  .role-media    { background: rgba( 86,131, 90, 0.14); color: #3e6644; } /* forest-dk */
  .role-health   { background: rgba(207,111,145, 0.16); color: #a54b70; } /* rose */
  .role-security { background: rgba( 92, 74,120, 0.16); color: #5a4a82; } /* plum */
  .role-accent   { background: rgba(216,108, 61, 0.18); color: #b2532a; } /* ember */

  /* Monochrome (current token) for comparison */
  .mono { color: var(--ink-700); }
