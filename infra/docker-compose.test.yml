services:
  backend:
    environment:
      APP_ENV: testing
      APP_URL: http://localhost:8082
      POSTGRES_SERVER: host.docker.internal
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_TEST_DB:-inkquill_codebase_test}
      BACKEND_CORS_ORIGINS: '["http://localhost:8082"]'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "38000:8000"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api/v1

  gateway:
    ports:
      - "8082:80"
