services:
  backend:
    environment:
      APP_ENV: development
      APP_URL: http://localhost:8080
      POSTGRES_USER: inkandquill_dev
      POSTGRES_PASSWORD: inkandquill_dev_password
      POSTGRES_DB: inkandquill_dev
      BACKEND_CORS_ORIGINS: '["http://localhost:8080","http://localhost:3000"]'
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/app/app
      - ./runtime/data:/app/runtime/data
      - ./runtime/logs:/app/runtime/logs
      - ./maintenance_status.json:/app/maintenance_status.json:ro
      - ./story_wizard_system_prompt.txt:/app/story_wizard_system_prompt.txt:ro
    ports:
      - "18000:8000"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      WATCHPACK_POLLING: "true"
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    volumes:
      - ./frontendv1:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

  gateway:
    ports:
      - "8080:80"

  db:
    environment:
      POSTGRES_USER: inkandquill_dev
      POSTGRES_PASSWORD: inkandquill_dev_password
      POSTGRES_DB: inkandquill_dev
    ports:
      - "5433:5432"

volumes:
  frontend_node_modules:
  frontend_next:
