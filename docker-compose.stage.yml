services:
  backend:
    environment:
      APP_ENV: staging
      APP_URL: http://localhost:8081
      POSTGRES_USER: inkandquill_stage
      POSTGRES_PASSWORD: inkandquill_stage_password
      POSTGRES_DB: inkandquill_stage
      BACKEND_CORS_ORIGINS: '["http://localhost:8081","http://localhost:3001"]'
    ports:
      - "28000:8000"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api/v1

  gateway:
    ports:
      - "8081:80"

  db:
    environment:
      POSTGRES_USER: inkandquill_stage
      POSTGRES_PASSWORD: inkandquill_stage_password
      POSTGRES_DB: inkandquill_stage
    ports:
      - "5434:5432"
